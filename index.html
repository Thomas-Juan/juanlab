<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juan Lab | Mechanosensation and Bioengineering</title>
  <meta name="description" content="Website for the  Juan Lab at Uppsala University, focused on mechanosensation during cardiovascular development and biomolecule engineering." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --light: #999999;
      --border: #e5e5e5;
      --max-w: 1100px;
      --serif: 'EB Garamond', 'Georgia', serif;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      color: var(--text);
      background: var(--bg);
      line-height: 1.65;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    img { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }
    a:hover { color: var(--muted); }

    .w { width: min(calc(100% - 3rem), var(--max-w)); margin: 0 auto; }

    /* ─── Header ─── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .brand {
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .brand svg { flex-shrink: 0; }

    .nav-links { display: flex; align-items: center; gap: 2rem; }
    .nav-links a {
      font-size: 0.92rem;
      color: var(--muted);
      transition: color 0.15s;
    }
    .nav-links a:hover { color: var(--text); }

    /* ─── Hero ─── */
    .hero {
      padding: 5rem 0 0;
      border-bottom: 1px solid var(--border);
    }

    .hero-top {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 4rem;
      align-items: start;
      margin-bottom: 3.5rem;
    }

    .hero h1 {
      font-family: var(--serif);
      font-size: clamp(2.8rem, 5.5vw, 4.2rem);
      font-weight: 400;
      line-height: 1.08;
      letter-spacing: -0.02em;
      margin-bottom: 1.6rem;
    }

    .hero-text p {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 52ch;
      line-height: 1.7;
    }

    .hero-aside {
      padding-top: 0.5rem;
    }

    .hero-aside p {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 1.4rem;
    }

    .hero-links { display: flex; flex-direction: column; gap: 0.3rem; }
    .hero-links a {
      font-size: 0.92rem;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .hero-links a::after { content: '↗'; font-size: 0.8em; color: var(--light); }
    .hero-links a:hover { color: var(--muted); }

    .hero-image {
      width: 100%;
      height: 380px;
      object-fit: cover;
      display: block;
    }

    /* ─── Section shared ─── */
    .section { padding: 5rem 0; border-bottom: 1px solid var(--border); }
    .section:last-of-type { border-bottom: none; }

    .section-title {
      font-family: var(--serif);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      margin-bottom: 3rem;
    }

    /* ─── Research ─── */
    .research-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2.5rem;
    }

    .research-item {}

    .research-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 1.2rem;
      filter: grayscale(15%);
    }

    .research-item h3 {
      font-family: var(--serif);
      font-size: 1.3rem;
      font-weight: 500;
      line-height: 1.25;
      margin-bottom: 0.75rem;
    }

    .research-item p {
      color: var(--muted);
      font-size: 0.93rem;
      line-height: 1.65;
    }

    .research-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.85rem;
    }

    .research-tags span {
      font-size: 0.78rem;
      color: var(--light);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 500;
    }

    .research-tags span + span::before {
      content: '·';
      margin-right: 0.4rem;
    }

    /* ─── Team ─── */
    .team-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2.5rem;
      text-align: center;
    }

    .person { display: flex; flex-direction: column; align-items: center; gap: 0.6rem; }

    .person-avatar {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      overflow: hidden;
      display: grid;
      place-items: center;
      background: #f3f3f3;
      margin-bottom: 0.3rem;
    }

    .person-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .person-initials {
      font-family: var(--serif);
      font-size: 1.6rem;
      color: var(--light);
      font-weight: 400;
    }

    .person-name {
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: -0.01em;
    }

    .person-role {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .person-links {
      display: flex;
      gap: 0.9rem;
      justify-content: center;
      margin-top: 0.15rem;
    }

    .person-links a {
      font-size: 0.82rem;
      color: var(--light);
      transition: color 0.15s;
    }
    .person-links a:hover { color: var(--text); }

    /* ─── Publications ─── */
    .pub-item {
      padding: 0.75rem 0;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 1.2rem;
      align-items: start;
    }

    .pub-item:last-child { border-bottom: 1px solid var(--border); }

    .pub-thumb {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
      filter: grayscale(20%);
    }

    .pub-body { display: flex; flex-direction: column; gap: 0.2rem; }

    .pub-item h3 {
      font-family: var(--serif);
      font-size: 1.15rem;
      font-weight: 500;
      line-height: 1.35;
    }

    .pub-item h3 a:hover { text-decoration: underline; }

    .pub-scholar-profile-link {
      font-size: 0.82rem;
      color: var(--light);
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      transition: color 0.15s;
    }
    .pub-scholar-profile-link:hover { color: var(--text); }
    .pub-scholar-profile-link::after { content: '↗'; font-size: 0.75em; }

    .pub-authors {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .pub-journal {
      font-size: 0.85rem;
      color: var(--light);
      font-style: italic;
    }

    .pub-scholar-link {
      font-size: 0.82rem;
      color: var(--light);
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      margin-top: 0.15rem;
      transition: color 0.15s;
    }
    .pub-scholar-link:hover { color: var(--text); }
    .pub-scholar-link::after { content: '↗'; font-size: 0.75em; }

    /* ─── Contact / CTA ─── */
    .contact-section {
      padding: 5rem 0;
    }

    .contact-inner {
      max-width: 600px;
    }

    .contact-inner h2 {
      font-family: var(--serif);
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    .contact-inner p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 1.6rem;
    }

    .contact-links { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .contact-links a {
      font-size: 0.92rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    .contact-links a::after { content: '↗'; font-size: 0.8em; color: var(--light); }

    /* ─── Footer ─── */
    .site-footer {
      padding: 2rem 0 3rem;
      border-top: 1px solid var(--border);
      color: var(--light);
      font-size: 0.85rem;
    }

    .footer-row {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    /* ─── Responsive ─── */
    @media (max-width: 900px) {
      .hero-top { grid-template-columns: 1fr; gap: 2rem; }
      .research-grid { grid-template-columns: 1fr; gap: 2.5rem; }
      .team-grid { grid-template-columns: repeat(2, 1fr); gap: 2rem; }
    }

    @media (max-width: 600px) {
      .hero { padding: 3.5rem 0 0; }
      .section { padding: 3.5rem 0; }
      .nav { height: auto; padding: 1rem 0; flex-direction: column; align-items: flex-start; gap: 0.75rem; }
      .nav-links { gap: 1.2rem; }
      .team-grid { grid-template-columns: 1fr 1fr; }
      .hero-image { height: 240px; }
      .pub-thumb { width: 60px; height: 60px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="w nav">
      <a class="brand" href="#top">
        <svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Juan Lab logo">

  <main id="top">
    <!-- Hero -->
    <section class="hero">
      <div class="w hero-top">
        <div class="hero-text">
          <h1 id="heroHeadline"></h1>
          <p id="heroDescription"></p>
        </div>
        <div class="hero-aside">
          <p id="heroAffiliation"></p>
          <div class="hero-links" id="heroLinks"></div>
        </div>
      </div>
      <img class="hero-image" id="heroImage" alt="Abstract fluid dynamics" />
    </section>

    <!-- Research -->
    <section class="section" id="research">
      <div class="w">
        <h2 class="section-title" id="researchTitle"></h2>
        <div class="research-grid" id="researchGrid"></div>
      </div>
    </section>

    <!-- Team -->
    <section class="section" id="team">
      <div class="w">
        <h2 class="section-title" id="teamTitle"></h2>
        <div class="team-grid" id="teamGrid"></div>
      </div>
    </section>

    <!-- Publications -->
    <section class="section" id="publications">
      <div class="w">
        <h2 class="section-title" id="pubsTitle"></h2>
        <div id="pubList"></div>
      </div>
    </section>

    <!-- Contact -->
    <section class="contact-section" id="contact">
      <div class="w">
        <div class="contact-inner">
          <h2 id="contactHeading"></h2>
          <p id="contactText"></p>
          <div class="contact-links" id="contactLinks"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="w footer-row">
      <span>&copy; <span id="year"></span> <span id="footerText"></span></span>
    </div>
  </footer>

  <script>
    /* ═══════════════════════════════════════════════════════════════════════
       SITE CONTENT — Edit text, URLs, and data below. Nothing else to touch.
       ═══════════════════════════════════════════════════════════════════════ */

    // ── Brand / Header ──────────────────────────────────────────────────
    const BRAND_NAME = "Juan Lab";

    // ── Hero section ────────────────────────────────────────────────────
    const HERO_HEADLINE = "The cardiovascular system is shaped by mechanical forces";

    const HERO_DESCRIPTION =
      "We study how mechanical forces control cardiovascular development and function in a vertebrate model, the zebrafish. " +
      "We engineer biomolecules to control gene expression and stability " +
      "using high-throughput screening methods.";

    const HERO_AFFILIATION =
      "Laboratory of Mechanosensation and Biomolecule engineering" +

    // ── Section headings ────────────────────────────────────────────────
    const SECTION_TITLE_RESEARCH     = "Research";
    const SECTION_TITLE_TEAM         = "Team";
    const SECTION_TITLE_PUBLICATIONS = "Publications";

    // ── Research cards ──────────────────────────────────────────────────
    const RESEARCH_ITEMS = [

        image: "https://images.unsplash.com/photo-1557672172-298e090bd0f1?w=600&h=400&fit=crop",
        alt: "Abstract light and motion",

      },      
      {
        image: "https://images.unsplash.com/photo-1557672172-298e090bd0f1?w=600&h=400&fit=crop",

        tags: ["Endocardium", "Mechanosensation"],

    // ── Google Scholar profile ───────────────────────────────────────────

    // ── Publications ────────────────────────────────────────────────────
    const PUBLICATIONS = [

    /* ═══════════════════════════════════════════════════════════════════════

    document.getElementById('researchGrid').innerHTML = RESEARCH_ITEMS.map(r => `

        <div class="person-name">${m.name}</div>
        <div class="person-role">${m.role}</div>
        ${m.links.length ? `<div class="person-links">${m.links.map(l => `<a href="${l.url}" target="_blank" rel="noreferrer">${l.label}</a>`).join('')}</div>` : ''}
      </div>
    `).join('');

    document.getElementById('pubList').innerHTML = PUBLICATIONS.map(p => {
      const scholarUrl = `https://scholar.google.com/scholar?q=${encodeURIComponent(p.scholarQuery)}`;
      return `
      <article class="pub-item">
        <img class="pub-thumb" src="${p.image}" alt="Abstract image for publication" />
        <div class="pub-body">
          <h3>${p.link && p.link !== '#' ? `<a href="${p.link}" target="_blank" rel="noreferrer">${p.title}</a>` : p.title}</h3>
          <a class="pub-scholar-profile-link" href="${SCHOLAR_PROFILE_URL}" target="_blank" rel="noreferrer">Google Scholar</a>
          <div class="pub-authors">${p.authors}</div>
          <div class="pub-journal">${p.journal} (${p.year})</div>
        </div>
      </article>
    `}).join('');

    document.getElementById('contactHeading').textContent = CONTACT_HEADING;
    document.getElementById('contactText').textContent = CONTACT_TEXT;
    document.getElementById('contactLinks').innerHTML = CONTACT_LINKS.map(l =>
      `<a href="${l.url}" target="_blank" rel="noreferrer">${l.label}</a>`
    ).join('');

    document.getElementById('footerText').textContent = FOOTER_TEXT;
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
